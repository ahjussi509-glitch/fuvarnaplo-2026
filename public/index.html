<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🚕 Fuvarnapló 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0a0f1e;
  --surface: #111828;
  --surface2: #1a2438;
  --accent: #f5c542;
  --accent2: #ffd966;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #5dade2;
  --text: #ffffff;
  --muted: #9aaac4;
  --border: #1e2d4a;
  --radius: 16px;
  --font-mono: 'Space Mono', monospace;
  --font: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* HEADER */
.app-header {
  background: #080d18;
  padding: 20px 16px 16px;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.app-title {
  font-family: var(--font-mono);
  font-size: 18px;
  color: var(--accent);
  letter-spacing: -0.5px;
  font-weight: 700;
}

.month-selector {
  display: flex;
  align-items: center;
  gap: 8px;
}

.month-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
}

.month-label {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--accent);
  min-width: 90px;
  text-align: center;
  font-weight: 700;
}

/* QUICK STATS BAR */
.quick-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.qs-item {
  text-align: center;
}

.qs-value {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}

.qs-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}

.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex: 1;
  min-width: 70px;
  padding: 10px 8px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* CONTENT */
.content { padding: 16px; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}

/* CALENDAR */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-header {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  font-weight: 700;
  padding: 4px 0;
}

.cal-day {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  position: relative;
}

.cal-day:active { transform: scale(0.92); }

.cal-day.empty { cursor: default; }

.cal-day.today { border-color: var(--accent); border-width: 2px; }

.cal-day.has-data { background: var(--surface2); }

.cal-day.selected { background: var(--accent); }
.cal-day.selected .cal-day-num { color: #000; }
.cal-day.selected .cal-day-amt { color: #000; }

.cal-day-num {
  font-size: 13px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}

.cal-day-amt {
  font-size: 8px;
  color: var(--green);
  font-family: var(--font-mono);
  margin-top: 2px;
}

/* DAY FORM */
.day-panel {
  background: var(--surface2);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.day-panel-title {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
}

.close-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
}

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }

label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
}

input, select, textarea {
  background: #f5c542;
  border: 1px solid #d4a820;
  border-radius: 10px;
  padding: 10px 12px;
  color: #000000;
  font-family: var(--font);
  font-size: 15px;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}

input::placeholder, textarea::placeholder {
  color: #6b5010;
}

input:focus, select:focus, textarea:focus {
  border-color: #ffffff;
  border-width: 2px;
}

textarea { resize: none; height: 60px; font-size: 13px; }

.btn {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn:active { transform: scale(0.96); }

.btn-primary { background: var(--accent); color: #000; }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
.btn-green { background: var(--green); color: #000; }
.btn-full { width: 100%; }

/* SHIFT SECTION */
.shift-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.shift-stat {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.shift-stat-val {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}

.shift-stat-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}

/* RIDE LIST */
.ride-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ride-num {
  width: 28px;
  height: 28px;
  background: var(--surface2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.ride-info { flex: 1; }

.ride-amount {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
}

.ride-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.ride-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 700;
}

.badge-cash { background: #2ecc7133; color: var(--green); }
.badge-card { background: #3498db33; color: var(--blue); }
.badge-valuta { background: #f39c1233; color: #f39c12; }
.badge-bolt { background: #f5c54233; color: var(--accent); }
.badge-uber { background: #ffd96633; color: var(--accent2); }

.ride-del-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  flex-shrink: 0;
}

/* PROGRESS BAR */
.progress-wrap {
  background: var(--surface2);
  border-radius: 100px;
  height: 10px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-bar {
  height: 100%;
  border-radius: 100px;
  transition: width 0.4s ease;
}

/* STATS */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child { border-bottom: none; }

.stat-name { font-size: 13px; color: var(--muted); }
.stat-val { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--text); }

/* CHART */
.chart-wrap {
  position: relative;
  height: 120px;
  display: flex;
  align-items: flex-end;
  gap: 2px;
  padding-bottom: 16px;
}

.chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
  gap: 2px;
}

.chart-bar {
  width: 100%;
  background: var(--green);
  border-radius: 4px 4px 0 0;
  transition: height 0.4s ease;
  min-height: 2px;
  opacity: 0.9;
}

.chart-bar.today-bar { background: var(--accent); opacity: 1; }

.chart-label {
  font-size: 8px;
  color: var(--muted);
  text-align: center;
  position: absolute;
  bottom: 0;
}

/* WEEKLY */
.week-card {
  background: var(--surface2);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
}

.week-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.week-title { font-size: 12px; font-weight: 700; color: var(--text); }
.week-total { font-family: var(--font-mono); font-size: 14px; color: var(--accent); }

.week-sub {
  font-size: 11px;
  color: var(--muted);
}

/* PAYMENT BARS */
.pay-row {
  margin-bottom: 10px;
}

.pay-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
  font-size: 12px;
}

.pay-name { color: var(--text); font-weight: 600; }
.pay-pct { color: var(--muted); font-family: var(--font-mono); }

/* GOALS */
.goal-section { margin-bottom: 12px; }

.goal-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.goal-label { font-size: 13px; font-weight: 600; }
.goal-numbers { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

/* BOTTOM NAV */
.bottom-fab {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 50px;
  padding: 14px 28px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(245,197,66,0.35);
  z-index: 200;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.bottom-fab:active { transform: translateX(-50%) scale(0.95); }

/* EXPORT */
.export-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

/* SEPARATOR */
.sep {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: #000;
  padding: 10px 20px;
  border-radius: 100px;
  font-weight: 700;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.toast.show { opacity: 1; }

/* Pill group */
.pill-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}

.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.divider-label {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 8px 0;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">🚕 FUVARNAPLÓ <span style="font-size:10px;color:var(--muted);font-family:var(--font-mono);font-weight:400">v30</span></div>
    <div class="month-selector">
      <button class="month-btn" onclick="prevMonth()">→</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="nextMonth()">→</button>
    </div>
  </div>
  <div class="quick-stats" id="quickStats"></div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" onclick="switchTab('naptar')">📅 Naptár</div>
  <div class="tab" onclick="switchTab('stat')">📊 Statisztika</div>
  <div class="tab" onclick="switchTab('celok')">🎯 Célok</div>
  <div class="tab" onclick="switchTab('export')">💑 Export</div>
  <div class="tab" onclick="switchTab('ev')">🗓 Éves</div>
</div>

<div class="content" id="content"></div>

<button class="bottom-fab" id="fabBtn" onclick="openNewRide()">+ Fuvar rögzítése</button>

<script>
// ===== STATE =====
const MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
const MONTH_SHORT = ['Jan','Feb','Már','Ápr','Máj','Jún','Júl','Aug','Szep','Okt','Nov','Dec'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];
const PAY_TYPES = ['Készpénz','Bankkártya','City Taxi App','Valuta'];
const PAY_COLORS = ['#2ecc71','#3498db','#f5c542','#ff6b35'];

const ZONES = [
  '→ Nincs megadva →',
  'Belváros (V., VI., VII. ker.)',
  'Budai oldal (I., II., III., XI., XII. ker.)',
  'Pesti oldal (VIII., IX., X., XIII., XIV. ker.)',
  'Külterület (IV., XV–XXII. ker.)',
  'Repülőtér (Ferihegy)',
  'Agglomeráció (Budapesten túl)',
];
const ZONE_COLORS = ['#6b7280','#3498db','#9b59b6','#2ecc71','#e67e22','#e74c3c','#1abc9c'];

const CATEGORIES = [
  '→ Nincs megadva →',
  'Applikáció',
  'Előrendelés',
  'Hoteles',
  'Külföldi',
  'Utcai',
  'Új megrendelő',
  'Nyugdíjas',
];
const CAT_COLORS = ['#6b7280','#3498db','#f5c542','#9b59b6','#1abc9c','#e67e22','#e74c3c'];

const today = new Date();

let state = {
  year: 2026,
  month: today.getMonth(),
  tab: 'naptar',
  selectedDay: null,
  editRideId: null,
  showDayPanel: false,
  rides: [],
  shifts: {},
  goals: { daily: 0, weekly: 0 },
};

// ── API-alapú mentés/betöltés (Replit backend) ──────────────

let _saveTimer = null;

async function loadState() {
  try {
    showToast('⏳ Betöltés...', '#5dade2');
    const resp = await fetch('/api/data');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    state.rides  = data.rides  || [];
    state.shifts = data.shifts || {};
    state.goals  = data.goals  || { daily: 0, weekly: 0 };
    render();
    showToast('✓ ' + state.rides.length + ' fuvar betöltve', '#2ecc71');
  } catch (e) {
    console.error('loadState hiba:', e);
    showToast('⚠️ Szerver nem elérhető!', '#e74c3c');
    render();
  }
}

function saveState() {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_flushSave, 600);
}

async function _flushSave() {
  try {
    await Promise.all([
      fetch('/api/rides',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ rides:  state.rides  }) }),
      fetch('/api/shifts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ shifts: state.shifts }) }),
      fetch('/api/goals',  { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(state.goals) }),
    ]);
  } catch (e) {
    console.error('Mentési hiba:', e);
    showToast('⚠️ Mentési hiba!', '#e74c3c');
  }
}

// ===== HELPERS =====
function fmt(n) {
  return Math.round(n).toLocaleString('hu-HU') + ' Ft';
}

function fmtShort(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace('.',',') + 'e';
  return Math.round(n).toString();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function timeDiff(start, end) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let d = (eh*60+em)-(sh*60+sm);
  if (d < 0) d += 1440;
  return d/60;
}

function shiftKey(year, month, day) {
  return `${year}_${month}_${day}`;
}

function getMonthRides(year, month) {
  return state.rides.filter(r => r.year===year && r.month===month);
}

function getDayRides(year, month, day) {
  return state.rides.filter(r => r.year===year && r.month===month && r.day===day);
}

function getShift(year, month, day) {
  return state.shifts[shiftKey(year, month, day)] || { start:'', end:'', startKm:'', endKm:'', breaks:[] };
}

function timeDiffMin(start, end) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let diff = (eh*60+em)-(sh*60+sm);
  if (diff < 0) diff += 1440;
  return diff;
}

function getDayTotal(year, month, day) {
  return getDayRides(year, month, day).reduce((s,r) => s+Number(r.amount), 0);
}

function getMonthTotal(year, month) {
  return getMonthRides(year, month).reduce((s,r) => s+(Number(r.amount)||0), 0);
}

function showToast(msg, color='#2ecc71') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== NAVIGATION =====
function prevMonth() {
  if (state.month === 0) { state.month = 11; state.year--; }
  else state.month--;
  state.selectedDay = null;
  render();
}

function nextMonth() {
  if (state.month === 11) { state.month = 0; state.year++; }
  else state.month++;
  state.selectedDay = null;
  render();
}

function switchTab(tab) {
  state.tab = tab;
  state.selectedDay = null;
  render();
}

function selectDay(d) {
  if (state.selectedDay === d) {
    state.selectedDay = null;
    state.showDayPanel = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    state.selectedDay = d;
    state.showDayPanel = true;
    render();
    // Scroll past the calendar to the day panel
    setTimeout(() => {
      const el = document.querySelector('.day-panel');
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }, 80);
  }
}

function openNewRide() {
  if (!state.selectedDay) {
    const d = today.getDate();
    state.selectedDay = d;
    state.showDayPanel = true;
    state.tab = 'naptar';
  }
  state.showDayPanel = true;
  render();
  setTimeout(() => {
    const el = document.getElementById('rideForm');
    if (el) el.scrollIntoView({ behavior:'smooth' });
  }, 100);
}

// ===== RENDER MAIN =====
function render() {
  document.getElementById('monthLabel').textContent = MONTH_SHORT[state.month] + ' ' + state.year;
  renderQuickStats();
  renderTabs();
  renderContent();
}

function renderQuickStats() {
  const rides = getMonthRides(state.year, state.month);
  const total = rides.reduce((s,r) => s+(Number(r.amount)||0), 0);
  const todayRides = rides.filter(r => r.day === today.getDate() &&
    state.year === today.getFullYear() && state.month === today.getMonth());
  const todayTotal = todayRides.reduce((s,r) => s+(Number(r.amount)||0), 0);

  document.getElementById('quickStats').innerHTML = `
    <div class="qs-item">
      <div class="qs-value">${fmtShort(todayTotal)} Ft</div>
      <div class="qs-label">Mai bevétel</div>
    </div>
    <div class="qs-item">
      <div class="qs-value">${rides.length}</div>
      <div class="qs-label">Havi fuvar</div>
    </div>
    <div class="qs-item">
      <div class="qs-value">${fmtShort(total)} Ft</div>
      <div class="qs-label">Havi bevétel</div>
    </div>
  `;
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['naptar','stat','celok','export','ev'];
    t.className = 'tab' + (state.tab === tabs[i] ? ' active' : '');
  });
}

function renderContent() {
  const c = document.getElementById('content');
  if (state.tab === 'naptar') c.innerHTML = renderCalendarTab();
  else if (state.tab === 'stat') c.innerHTML = renderStatTab();
  else if (state.tab === 'celok') c.innerHTML = renderGoalsTab();
  else if (state.tab === 'export') c.innerHTML = renderExportTab();
  else if (state.tab === 'ev') c.innerHTML = renderYearTab();
}

// ===== CALENDAR TAB =====
function renderCalendarTab() {
  const dim = DAYS_IN_MONTH[state.month];
  const firstDay = new Date(state.year, state.month, 1).getDay();
  const offset = (firstDay + 6) % 7; // Monday first

  let html = `<div class="card">
    <div class="card-title">📅 ${MONTHS[state.month]} ${state.year}</div>
    <div class="calendar-grid">
      ${['H','K','Sz','Cs','P','Sz','V'].map(d => `<div class="cal-header">${d}</div>`).join('')}
  `;

  for (let i=0; i<offset; i++) html += `<div class="cal-day empty"></div>`;

  for (let d=1; d<=dim; d++) {
    const dayTotal = getDayTotal(state.year, state.month, d);
    const dayRides = getDayRides(state.year, state.month, d).length;
    const isToday = today.getFullYear()===state.year && today.getMonth()===state.month && today.getDate()===d;
    const isSel = state.selectedDay === d;
    let cls = 'cal-day';
    if (dayRides > 0) cls += ' has-data';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';

    html += `<div class="${cls}" onclick="selectDay(${d})">
      <div class="cal-day-num">${d}</div>
      ${dayTotal > 0 ? `<div class="cal-day-amt">${fmtShort(dayTotal)}</div>` : ''}
    </div>`;
  }

  html += `</div></div>`;

  if (state.selectedDay && state.showDayPanel) {
    html += renderDayPanel();
  }

  return html;
}

function saveShift() {
  const { year, month, selectedDay: d } = state;
  if (!d) return;
  const key = shiftKey(year, month, d);
  const existing = state.shifts[key] || {};
  state.shifts[key] = {
    start: document.getElementById('shiftStart')?.value || '',
    end: document.getElementById('shiftEnd')?.value || '',
    startKm: document.getElementById('shiftStartKm')?.value || '',
    endKm: document.getElementById('shiftEndKm')?.value || '',
    breaks: existing.breaks || [],
  };
  saveState();
  render();
}

function addBreak(day) {
  const bs = document.getElementById('breakStart')?.value;
  const be = document.getElementById('breakEnd')?.value;
  if (!bs || !be) { showToast('Add meg a szünet kezdetét és végét!', '#e74c3c'); return; }
  if (timeDiffMin(bs,be) <= 0) { showToast('A vége legyen a kezdet után!', '#e74c3c'); return; }
  const key = shiftKey(state.year, state.month, day);
  if (!state.shifts[key]) state.shifts[key] = { start:'', end:'', startKm:'', endKm:'', breaks:[] };
  if (!state.shifts[key].breaks) state.shifts[key].breaks = [];
  state.shifts[key].breaks.push({ start: bs, end: be });
  state.shifts[key].breaks.sort((a,b) => a.start.localeCompare(b.start));
  saveState();
  showToast('Szünet rögzítve! ✓');
  render();
}

function deleteBreak(day, idx) {
  const key = shiftKey(state.year, state.month, day);
  if (state.shifts[key]?.breaks) {
    state.shifts[key].breaks.splice(idx, 1);
    saveState();
    showToast('Szünet törölve.', '#e74c3c');
    render();
  }
}

// ===== AUTO-ZÓNA FELISMERÉS =====
function autoZoneFromText(text, zoneId) {
  const zone = detectZone(text);
  if (zone) {
    const sel = document.getElementById(zoneId);
    if (sel) sel.value = zone;
  }
}
function detectZone(text) {
  if (!text) return null;
  const t = text.toLowerCase().trim();

  // Repülőtér
  if (/ferihegy|repül[oő]|liszt ferenc|terminal|1185/.test(t)) {
    return 'Repülőtér (Ferihegy)';
  }

  // Agglomeráció – városok Budapesten kívül
  if (/budaörs|budakeszi|szigetszentmikl|érd\b|érdi|dunakeszi|göd\b|fót\b|pomáz|szentendre|visegrád|vác\b|gödöll[oő]|vecsés|gyál|maglód|monor|pécel|isaszeg|kerepes|csömör|mogyoród|ecser|üllő|ócsa|bugyi|dunaharaszti|taksony|szigethalom|halásztelek|diósd|törökbálint|biatorbágy|herceghalom|pilisvörösvár|piliscsaba|solymár|nagykovácsi|telki|páty|etyek|martonvásár|százhalombatta|albertirsa|cegléd|dabas|ráckeve/.test(t)) {
    return 'Agglomeráció (Budapesten túl)';
  }

  // Irányítószám alapú felismerés
  const zipMatch = t.match(/\b(1\d{3})\b/);
  if (zipMatch) {
    const zip = parseInt(zipMatch[1]);
    const ker = Math.floor((zip - 1000) / 10);
    if ([5,6,7].includes(ker)) return 'Belváros (V., VI., VII. ker.)';
    if ([1,2,3,11,12].includes(ker)) return 'Budai oldal (I., II., III., XI., XII. ker.)';
    if ([8,9,10,13,14].includes(ker)) return 'Pesti oldal (VIII., IX., X., XIII., XIV. ker.)';
    if ([4,15,16,17,18,19,20,21,22].includes(ker)) return 'Külterület (IV., XV–XXII. ker.)';
  }

  // Kerület szöveges
  const kerMatch = t.match(/\b([ivxlcdm]+|[1-9]|1[0-9]|2[0-3])[.\s]*(ker[.\s]|kerület)/i);
  if (kerMatch) {
    const raw = kerMatch[1].toLowerCase();
    const romanMap = {i:1,ii:2,iii:3,iv:4,v:5,vi:6,vii:7,viii:8,ix:9,x:10,xi:11,xii:12,xiii:13,xiv:14,xv:15,xvi:16,xvii:17,xviii:18,xix:19,xx:20,xxi:21,xxii:22,xxiii:23};
    const k = romanMap[raw] || parseInt(raw);
    if ([5,6,7].includes(k)) return 'Belváros (V., VI., VII. ker.)';
    if ([1,2,3,11,12].includes(k)) return 'Budai oldal (I., II., III., XI., XII. ker.)';
    if ([8,9,10,13,14].includes(k)) return 'Pesti oldal (VIII., IX., X., XIII., XIV. ker.)';
    if ([4,15,16,17,18,19,20,21,22].includes(k)) return 'Külterület (IV., XV–XXII. ker.)';
  }

  // Belváros ismert helyek
  if (/keleti|nyugati|déli|blaha|astoria|deák|oktogon|opera|andrássy|rákóczi|kalvin|fővám|corvin|vörösmarty|váci|gellért|parlament|bazilika|várhegy|széchenyi|ferenciek|nagykörút/.test(t))
    return 'Belváros (V., VI., VII. ker.)';

  // Budai oldal
  if (/kelenföld|albertfalva|gazdagrét|budafok|móricz|kosztolányi|etele|alkotás|hegyvidék|krisztinaváros|tabán|naphegy|sashegy|farkasrét|zugliget|pesthidegkút|békásmegyer|csillaghegy|aquincum|óbuda|flórián|kaszásdűlő/.test(t))
    return 'Budai oldal (I., II., III., XI., XII. ker.)';

  // Pesti oldal
  if (/újpest|angyalföld|lehel|zugló|örs vezér|kőbánya|pesterzsébet|csepel|kispest|józsefváros|ferencváros|lágymányos|havanna|pestszentlőrinc/.test(t))
    return 'Pesti oldal (VIII., IX., X., XIII., XIV. ker.)';

  // Külső területek
  if (/rákospalota|rákosliget|rákoskert|rákoscsaba|rákoshegy|pestújhely|mátyásföld|sashalom|cinkota|rákosmente/.test(t))
    return 'Külterület (IV., XV–XXII. ker.)';

  return null;
}

function autoZone(inputId, selectId) {

  const zone = detectZone(text);
  if (zone) {
    const sel = document.getElementById(selectId);
    if (sel) sel.value = zone;
  }
}
function fmtTimeInput(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
  el.value = v;
}

function addRide() {
  const amount = Number(document.getElementById('rAmount')?.value);
  if (!amount || amount <= 0) { showToast('Add meg az összeget!', '#e74c3c'); return; }
  if (amount < 1100) { showToast('Minimum összeg: 1 100 Ft (alapdíj)!', '#e74c3c'); return; }

  const payType = document.getElementById('rPay')?.value || 'Készpénz';
  const currency = document.getElementById('rCurrency')?.value || '';
  const currencyAmount = document.getElementById('rCurrencyAmount')?.value || '';
  const baseNote = document.getElementById('rNote')?.value || '';
  const valutaNote = (payType === 'Valuta' && currencyAmount)
    ? `${currencyAmount} ${currency}${baseNote ? ' · ' + baseNote : ''}`
    : baseNote;

  const fields = {
    amount,
    payType,
    currency: payType === 'Valuta' ? currency : '',
    currencyAmount: payType === 'Valuta' ? currencyAmount : '',
    time: document.getElementById('rTime')?.value || '',
    arrivalTime: document.getElementById('rArrivalTime')?.value || '',
    fromZone: document.getElementById('rFromZone')?.value || '',
    toZone: document.getElementById('rToZone')?.value || '',
    category: Array.from(document.querySelectorAll('#rCategoryPills .pill.active')).map(el => el.dataset.cat),
    from: document.getElementById('rFrom')?.value || '',
    to: document.getElementById('rTo')?.value || '',
    km: document.getElementById('rKm')?.value || '',
    pickupKm: document.getElementById('rPickupKm')?.value || '',
    pickupTime: document.getElementById('rPickupTime')?.value || '',
    note: valutaNote,
  };

  if (state.editRideId) {
    // UPDATE existing ride
    const idx = state.rides.findIndex(r => r.id === state.editRideId);
    if (idx !== -1) {
      state.rides[idx] = { ...state.rides[idx], ...fields };
    }
    state.editRideId = null;
    showToast('Fuvar frissítve! ✓');
  } else {
    // ADD new ride
    state.rides.push({
      id: uid(),
      year: state.year,
      month: state.month,
      day: state.selectedDay,
      ...fields,
    });
    showToast('Fuvar mentve! ✓');

    // Automatikus mentés minden 3. fuvarnál
    const rideCount = state.rides.length;
    if (rideCount % 3 === 0) {
      autoBackup();
      showToast(`💾 Auto-mentés (${rideCount}. fuvar)`);
    }
  }

  saveState();
  render();
}

function getBackupData() {
  return JSON.stringify({
    rides: state.rides,
    shifts: state.shifts,
    goals: state.goals,
    exportDate: new Date().toISOString()
  }, null, 2);
}

function autoBackup() {
  try {
    const stamp = new Date().toISOString().slice(0,10);
    const filename = `fuvarnaplo_${stamp}_auto.json`;
    const data = getBackupData();
    const blob = new Blob([data], { type: 'application/json' });

    // Web Share API – megosztás menü (Drive, Gmail, stb.)
    if (navigator.share && navigator.canShare) {
      const file = new File([blob], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Fuvarnapló backup' })
          .catch(() => downloadBlob(blob, filename)); // ha elutasítja, sima letöltés
        return;
      }
    }
    downloadBlob(blob, filename);
  } catch(e) {
    console.warn('Auto-mentés sikertelen:', e);
  }
}

function shareBackup() {
  const stamp = new Date().toISOString().slice(0,10);
  const filename = `fuvarnaplo_${stamp}.json`;
  const data = getBackupData();
  const blob = new Blob([data], { type: 'application/json' });

  if (navigator.share && navigator.canShare) {
    const file = new File([blob], filename, { type: 'application/json' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'Fuvarnapló mentés' })
        .then(() => showToast('Megosztva! ✓'))
        .catch(() => { downloadBlob(blob, filename); showToast('Letöltve! ✓'); });
      return;
    }
  }
  // Fallback: sima letöltés
  downloadBlob(blob, filename);
  showToast('Letöltve! (Megosztás nem elérhető)');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleValutaField() {
  const pay = document.getElementById('rPay')?.value;
  const vf = document.getElementById('valutaFields');
  if (vf) vf.style.display = (pay === 'Valuta') ? 'block' : 'none';
}

function toggleCatPill(el) {
  el.classList.toggle('active');
}

function setCatPills(cats) {
  // cats can be array or old string
  const catArr = Array.isArray(cats) ? cats : (cats && cats !== '→ Nincs megadva →' ? [cats] : []);
  document.querySelectorAll('#rCategoryPills .pill').forEach(el => {
    el.classList.toggle('active', catArr.includes(el.dataset.cat));
  });
}

function editRide(id) {
  const r = state.rides.find(r => r.id === id);
  if (!r) return;
  state.editRideId = id;

  // Scroll to form first
  setTimeout(() => {
    const el = document.getElementById('rideForm');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 50);

  // Fill in form fields
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('rAmount', r.amount);
  set('rTime', r.time);
  set('rArrivalTime', r.arrivalTime);
  set('rFrom', r.from);
  set('rTo', r.to);
  set('rKm', r.km);
  set('rPickupKm', r.pickupKm);
  set('rPickupTime', r.pickupTime);
  set('rNote', r.note);

  const setSelect = (id, val) => {
    const el = document.getElementById(id);
    if (el && val) el.value = val;
  };
  setSelect('rPay', r.payType);
  setSelect('rFromZone', r.fromZone);
  setSelect('rToZone', r.toZone);
  setCatPills(r.category);

  // Valuta mezők szerkesztéskor
  if (r.payType === 'Valuta') {
    toggleValutaField();
    setSelect('rCurrency', r.currency || 'EUR');
    set('rCurrencyAmount', r.currencyAmount || '');
  }

  // Update button labels
  const saveBtn = document.getElementById('rSaveBtn');
  const cancelBtn = document.getElementById('rCancelBtn');
  if (saveBtn) saveBtn.textContent = '✓ Módosítás mentése';
  if (saveBtn) saveBtn.style.background = 'var(--accent2)';
  if (cancelBtn) cancelBtn.style.display = 'block';
}

function cancelEdit() {
  state.editRideId = null;
  render();
}

function deleteRide(id) {
  const t = document.getElementById('toast');
  t.style.background = '#e74c3c';
  t.style.opacity = '1';
  t.style.pointerEvents = 'auto';
  t.innerHTML = 'Törlöd? <button onclick="confirmDelete(\''+id+'\')" style="margin-left:10px;background:#fff;color:#e74c3c;border:none;border-radius:8px;padding:3px 10px;font-weight:700;cursor:pointer">Igen</button> <button onclick="cancelDelete()" style="margin-left:4px;background:transparent;color:#fff;border:1px solid #fff;border-radius:8px;padding:3px 10px;cursor:pointer">Nem</button>';
}

function confirmDelete(id) {
  state.rides = state.rides.filter(r => r.id !== id);
  saveState();
  showToast('Törölve.', '#e74c3c');
  render();
}

function cancelDelete() {
  const t = document.getElementById('toast');
  t.style.opacity = '0';
  t.style.pointerEvents = 'none';
  t.innerHTML = '';
}

// ===== STAT TAB =====
function renderStatTab() {
  const { year, month } = state;
  const rides = getMonthRides(year, month);
  const total = rides.reduce((s,r) => s+(Number(r.amount)||0), 0);
  const workDays = new Set(rides.map(r => r.day)).size;
  const avgDay = workDays ? total / workDays : 0;
  const avgRide = rides.length ? total / rides.length : 0;
  const dim = DAYS_IN_MONTH[month];

  // Best day
  let bestDay = 0, bestDayTotal = 0, bestRideCount = 0;
  for (let d=1; d<=dim; d++) {
    const dt = getDayTotal(year, month, d);
    const dr = getDayRides(year, month, d).length;
    if (dt > bestDayTotal) { bestDayTotal = dt; bestDay = d; }
    if (dr > bestRideCount) bestRideCount = dr;
  }

  // Daily totals for chart
  const dailyTotals = [];
  for (let d=1; d<=dim; d++) dailyTotals.push(getDayTotal(year, month, d));
  const maxDaily = Math.max(...dailyTotals, 1);

  // Payment breakdown
  const payMap = {};
  PAY_TYPES.forEach(p => payMap[p] = { count:0, total:0 });
  rides.forEach(r => {
    const p = r.payType || 'Egyéb';
    if (payMap[p]) { payMap[p].count++; payMap[p].total += Number(r.amount)||0; }
  });

  // Weekly breakdown
  const weeks = [
    { label: `${month===1?'Feb':''}1→7`, days: [1,2,3,4,5,6,7] },
    { label: '8→14', days: [8,9,10,11,12,13,14] },
    { label: '15→21', days: [15,16,17,18,19,20,21] },
    { label: '22→'+dim, days: Array.from({length:dim-21},(_,i)=>i+22) },
  ];

  // Shift stats
  const shiftData = Object.keys(state.shifts)
    .filter(k => k.startsWith(`${year}_${month}_`))
    .map(k => state.shifts[k]);
  const totalHours = shiftData.reduce((s,sh) => s + timeDiff(sh.start, sh.end), 0);
  const hourly = totalHours > 0 ? total / totalHours : 0;

  let html = `
  <!-- Chart -->
  <div class="card">
    <div class="card-title">📊 Napi bevétel – ${MONTHS[month]}</div>
    <div class="chart-wrap" id="chartWrap">
  `;

  const chartGoal = Number(state.goals.daily) || 0;

  for (let d=0; d<dim; d++) {
    const v = dailyTotals[d];
    const h = maxDaily > 0 ? Math.max((v/maxDaily)*100, v>0?4:0) : 0;
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===(d+1);

    let color;
    if (v === 0) {
      color = 'transparent';
    } else if (chartGoal <= 0) {
      color = isToday ? 'var(--accent)' : 'var(--blue)';
    } else if (v >= chartGoal * 1.3) {
      color = '#9b59b6'; // Túllépte (+30%) – lila
    } else if (v >= chartGoal) {
      color = '#2ecc71'; // Elérte – zöld
    } else if (v >= chartGoal * 0.7) {
      color = '#f5c542'; // Közel (-30%) – sárga
    } else {
      color = '#e74c3c'; // Cél alatt – piros
    }

    html += `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${h}%;background:${color};opacity:${isToday?'1':'0.85'}${isToday?';outline:2px solid #fff;outline-offset:1px':''}"></div>
    </div>`;
  }

  html += `</div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;margin-bottom:10px">
      <span style="font-size:10px;color:var(--muted)">1</span>
      <span style="font-size:10px;color:var(--muted)">${dim}</span>
    </div>
    ${chartGoal > 0 ? `
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <span style="font-size:11px;background:#e74c3c33;color:#e74c3c;padding:3px 10px;border-radius:20px;font-weight:700">🔴 Cél alatt (-30%+)</span>
      <span style="font-size:11px;background:#f5c54233;color:#f5c542;padding:3px 10px;border-radius:20px;font-weight:700">🟡 Közel (-30%)</span>
      <span style="font-size:11px;background:#2ecc7133;color:#2ecc71;padding:3px 10px;border-radius:20px;font-weight:700">🟢 Elérte</span>
      <span style="font-size:11px;background:#9b59b633;color:#9b59b6;padding:3px 10px;border-radius:20px;font-weight:700">🟣 Túllépte (+30%)</span>
    </div>` : `<div style="font-size:11px;color:var(--muted);text-align:center">Állíts be napi célt a Célok fülön a színkódoláshoz</div>`}
  </div>

  <!-- Key Stats -->
  <div class="card">
    <div class="card-title">📱 Havi összesítő</div>
    <div class="stat-row"><span class="stat-name">Összes bevétel</span><span class="stat-val">${fmt(total)}</span></div>
    <div class="stat-row"><span class="stat-name">Fuvarok száma</span><span class="stat-val">${rides.length}</span></div>
    <div class="stat-row"><span class="stat-name">Dolgozott napok</span><span class="stat-val">${workDays}</span></div>
    <div class="stat-row"><span class="stat-name">Napi átlag</span><span class="stat-val">${fmt(avgDay)}</span></div>
    <div class="stat-row"><span class="stat-name">Fuvaronkénti átlag</span><span class="stat-val">${fmt(avgRide)}</span></div>
    ${totalHours > 0 ? `<div class="stat-row"><span class="stat-name">Ledolgozott órák</span><span class="stat-val">${totalHours.toFixed(1)} h</span></div>` : ''}
    ${hourly > 0 ? `<div class="stat-row"><span class="stat-name">Átlag Ft/óra</span><span class="stat-val">${fmt(hourly)}</span></div>` : ''}
  </div>

  <!-- Peaks -->
  <div class="card">
    <div class="card-title">🏆 Csúcsok</div>
    <div class="stat-row"><span class="stat-name">Legjobb nap</span><span class="stat-val">${bestDay ? MONTHS[month]+' '+bestDay+'.' : '→'}</span></div>
    <div class="stat-row"><span class="stat-name">Legjobb nap bevétel</span><span class="stat-val">${fmt(bestDayTotal)}</span></div>
    <div class="stat-row"><span class="stat-name">Max fuvar/nap</span><span class="stat-val">${bestRideCount}</span></div>
    <div class="stat-row"><span class="stat-name">Fuvar/munkanap átlag</span><span class="stat-val">${workDays ? (rides.length/workDays).toFixed(1) : '→'}</span></div>
  </div>

  <!-- Payment Breakdown -->
  <div class="card">
    <div class="card-title">💸 Fizetési módok</div>
  `;

  PAY_TYPES.forEach((p, i) => {
    const d = payMap[p];
    if (!d.count) return;
    const pct = total > 0 ? Math.round(d.total/total*100) : 0;
    html += `
    <div class="pay-row">
      <div class="pay-header">
        <span class="pay-name">${p}</span>
        <span class="pay-pct">${pct}% · ${fmt(d.total)} · ${d.count} fuvar</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${pct}%;background:${PAY_COLORS[i]}"></div>
      </div>
    </div>`;
  });

  html += `</div>

  <!-- Weekly -->
  <div class="card">
    <div class="card-title">📯 Heti bontás</div>
  `;

  weeks.forEach(w => {
    const wRides = rides.filter(r => w.days.includes(r.day));
    const wTotal = wRides.reduce((s,r) => s+(Number(r.amount)||0), 0);
    const wDays = new Set(wRides.map(r => r.day)).size;
    if (!wTotal && !wRides.length) return;
    html += `
    <div class="week-card">
      <div class="week-header">
        <div class="week-title">${MONTHS[month].slice(0,3)} ${w.label}</div>
        <div class="week-total">${fmt(wTotal)}</div>
      </div>
      <div class="week-sub">${wRides.length} fuvar · ${wDays} nap · átlag ${wDays ? fmt(wTotal/wDays) : '→'}/nap</div>
    </div>`;
  });

  html += `</div>`;

  // ===== Ft/óra színkód segédfüggvény =====
  // 0→4500: piros, 4501→6000: zöld, 6001+: lila
  function hourlyColor(fth) {
    if (fth <= 0) return { color: 'var(--muted)', label: '→', emoji: '' };
    if (fth <= 4500) return { color: '#e74c3c', label: 'Célérték alatt', emoji: '🔴' };
    if (fth <= 6000) return { color: '#2ecc71', label: 'Célértéken', emoji: '🟢' };
    return { color: '#9b59b6', label: 'Kiváló!', emoji: '🟣' };
  }

  // Peak hours 17-20 stats
  const peakHours = [17, 18, 19];
  const peakMap = {};
  peakHours.forEach(h => peakMap[h] = { count: 0, total: 0, minutes: 0 });

  rides.forEach(r => {
    if (!r.time) return;
    const h = parseInt(r.time.split(':')[0]);
    if (peakMap[h] !== undefined) {
      peakMap[h].count++;
      peakMap[h].total += Number(r.amount) || 0;
      // Ha van érkezési idő is, számoljuk a perceket
      if (r.arrivalTime) {
        peakMap[h].minutes += timeDiff(r.time, r.arrivalTime) * 60;
      }
    }
  });

  const hasPeakData = Object.values(peakMap).some(p => p.count > 0);
  const peakTotal = Object.values(peakMap).reduce((s, p) => s + p.total, 0);
  const peakCount = Object.values(peakMap).reduce((s, p) => s + p.count, 0);
  // Teljes havi Ft/óra (müszak adatok alapján)
  const monthFtH = totalHours > 0 ? total / totalHours : 0;
  const monthColor = hourlyColor(monthFtH);

  html += `<div class="card">
    <div class="card-title">⚡ Ft/óra teljesítmény</div>

    <!-- Havi összesített Ft/óra -->
    <div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700">Havi átlag Ft/óra</span>
        <span style="font-family:var(--font-mono);font-size:16px;font-weight:700;color:${monthColor.color}">
          ${monthFtH > 0 ? fmt(monthFtH) + '/h' : '→'}
        </span>
      </div>
      ${monthFtH > 0 ? `
      <div style="display:flex;align-items:center;gap:8px">

        </div>
        <span style="font-size:11px;color:${monthColor.color};font-weight:700">${monthColor.emoji} ${monthColor.label}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px">
        Célérték: 5 000 Ft/h · Ledolgozott: ${totalHours.toFixed(1)} h
      </div>` : `<div style="font-size:12px;color:var(--muted)">Adj meg müszak időpontokat a naptárban!</div>`}
    </div>

    <!-- Jelmagyarázat -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:11px;background:#e74c3c22;color:#e74c3c;padding:3px 10px;border-radius:20px;font-weight:700">🔴 0→4 500 Ft/h</span>
      <span style="font-size:11px;background:#2ecc7122;color:#2ecc71;padding:3px 10px;border-radius:20px;font-weight:700">🟢 4 501→6 000 Ft/h</span>
      <span style="font-size:11px;background:#9b59b622;color:#9b59b6;padding:3px 10px;border-radius:20px;font-weight:700">🟣 6 001+ Ft/h</span>
    </div>

    <div class="card-title">🕹 Csúcsidő bontás → 17:00→20:00</div>`;

  if (!hasPeakData) {
    html += `<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px">Még nincs időponttal rögzített fuvar</div>`;
  } else {
    html += `<div style="margin-bottom:10px">
      <div class="stat-row"><span class="stat-name">Csúcsidős fuvarok</span><span class="stat-val">${peakCount} db</span></div>
      <div class="stat-row"><span class="stat-name">Csúcsidős bevétel</span><span class="stat-val">${fmt(peakTotal)}</span></div>
      <div class="stat-row"><span class="stat-name">Összes fuvarból</span><span class="stat-val">${rides.length ? Math.round(peakCount/rides.length*100) : 0}%</span></div>
    </div>`;

    peakHours.forEach(h => {
      const p = peakMap[h];
      // Ft/óra: ha van menetidő adat, azzal; különben az 1 óra az alap
      const hours = p.minutes > 0 ? p.minutes / 60 : (p.count > 0 ? 1 : 0);
      const fth = hours > 0 ? p.total / hours : 0;
      const hc = hourlyColor(fth);

      html += `
      <div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${p.count>0?'8':'0'}px">
          <span style="font-size:14px;font-weight:700">${h}:00→${h+1}:00</span>
          <span style="font-family:var(--font-mono);font-size:13px;font-weight:700;color:${p.count>0?hc.color:'var(--muted)'}">
            ${p.count > 0 ? fmt(fth)+'/h' : '0 fuvar'}
          </span>
        </div>
        ${p.count > 0 ? `
        <div style="background:var(--border);border-radius:100px;height:10px;overflow:hidden;margin-bottom:6px">
          <div style="height:100%;border-radius:100px;background:${hc.color};width:${Math.min(fth/8000*100,100)}%;transition:width 0.4s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px">
          <span style="color:var(--muted)">${p.count} fuvar · ${fmt(p.total)}</span>
          <span style="color:${hc.color};font-weight:700">${hc.emoji} ${hc.label}</span>
        </div>` : ''}
      </div>`;
    });
  }

  html += `</div>`;

  // ===== KM STATISZTIKA =====
  const totalRideKm = rides.reduce((s,r) => s+(Number(r.km)||0), 0);
  const totalPickupKm = rides.reduce((s,r) => s+(Number(r.pickupKm)||0), 0);

  // Havi összes km: műszak start/end km összege, ha elérhető
  let totalShiftKm = 0;
  for (let d=1; d<=dim; d++) {
    const sh = state.shifts[shiftKey(year, month, d)] || {};
    if (sh.startKm && sh.endKm) {
      totalShiftKm += Math.abs(Number(sh.endKm) - Number(sh.startKm));
    }
  }
  // Üres km = műszak km - fuvar km - kiállási km (ha van műszak km)
  const totalEmptyKm = totalShiftKm > 0 ? Math.max(0, totalShiftKm - totalRideKm - totalPickupKm) : 0;
  // Összes km = fuvar + kiállás + üres
  const totalKm = totalRideKm + totalPickupKm + totalEmptyKm;

  if (totalKm > 0) {
    const rideKmPct   = Math.round(totalRideKm   / totalKm * 100);
    const pickupKmPct = Math.round(totalPickupKm / totalKm * 100);
    const emptyKmPct  = Math.max(0, 100 - rideKmPct - pickupKmPct);
    const ridesWithKm = rides.filter(r => r.km);
    const avgKm = ridesWithKm.length ? (totalRideKm / ridesWithKm.length).toFixed(1) : 0;
    const ftPerKm = totalRideKm > 0 ? Math.round(total / totalRideKm) : 0;

    // Napi km adatok – fuvar + kiállás + üres
    const dailyKm = [];
    for (let d=1; d<=dim; d++) {
      const dr = getDayRides(year, month, d);
      const sh = state.shifts[shiftKey(year, month, d)] || {};
      const rk = dr.reduce((s,r) => s+(Number(r.km)||0), 0);
      const pk = dr.reduce((s,r) => s+(Number(r.pickupKm)||0), 0);
      const shiftTotal = (sh.startKm && sh.endKm) ? Math.abs(Number(sh.endKm) - Number(sh.startKm)) : 0;
      const ek = shiftTotal > 0 ? Math.max(0, shiftTotal - rk - pk) : 0;
      const tot = rk + pk + ek;
      dailyKm.push({ ride: rk, pickup: pk, empty: ek, total: tot });
    }
    const bestKmDay = dailyKm.reduce((best,d,i) => d.total > (best?.total||0) ? {...d, day:i+1} : best, null);

    html += `<div class="card">
      <div class="card-title">🛣 Kilométer statisztika</div>
      <div class="stat-row"><span class="stat-name">Összes km</span><span class="stat-val">${totalKm.toFixed(1)} km</span></div>
      <div class="stat-row"><span class="stat-name">🔵 Fuvar km</span><span class="stat-val">${totalRideKm.toFixed(1)} km · ${rideKmPct}%</span></div>
      <div class="stat-row"><span class="stat-name">🟠 Kiállási km</span><span class="stat-val">${totalPickupKm.toFixed(1)} km · ${pickupKmPct}%</span></div>
      ${totalEmptyKm > 0 ? `<div class="stat-row"><span class="stat-name">⬜ Üres km</span><span class="stat-val">${totalEmptyKm.toFixed(1)} km · ${emptyKmPct}%</span></div>` : ''}
      ${avgKm > 0 ? `<div class="stat-row"><span class="stat-name">Átlag fuvar km</span><span class="stat-val">${avgKm} km/fuvar</span></div>` : ''}
      ${ftPerKm > 0 ? `<div class="stat-row"><span class="stat-name">Bevétel / km</span><span class="stat-val">${ftPerKm} Ft/km</span></div>` : ''}
      ${bestKmDay ? `<div class="stat-row"><span class="stat-name">Legtöbb km nap</span><span class="stat-val">${MONTHS[month]} ${bestKmDay.day}. · ${bestKmDay.total.toFixed(1)} km</span></div>` : ''}

      <div class="sep"></div>

      <!-- Napi km bontás -->
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:8px">NAPI KM BONTÁS</div>
      ${dailyKm.filter(d => d.total > 0).length === 0
        ? `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px">Nincs km adat</div>`
        : dailyKm.map((d,i) => {
            if (d.total === 0) return '';
            const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===(i+1);
            const rPct = Math.round(d.ride   / d.total * 100);
            const pPct = Math.round(d.pickup / d.total * 100);
            const ePct = Math.max(0, 100 - rPct - pPct);
            return `
            <div style="margin-bottom:14px${isToday ? ';padding:8px;background:var(--surface2);border-radius:10px;border:1px solid var(--accent)' : ''}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-size:12px;font-weight:700;color:${isToday?'var(--accent)':'var(--text)'}">${MONTHS[month]} ${i+1}.${isToday?' (ma)':''}</span>
                <span style="font-family:var(--font-mono);font-size:13px;font-weight:700">📏 ${d.total.toFixed(1)} km</span>
              </div>
              <div style="background:var(--border);border-radius:6px;height:20px;overflow:hidden;display:flex;margin-bottom:5px">
                <div style="background:#3498db;width:${rPct}%;display:flex;align-items:center;justify-content:center;min-width:${d.ride>0?'3px':'0'}">
                  ${rPct > 12 ? `<span style="font-size:10px;font-weight:700;color:#fff">${rPct}%</span>` : ''}
                </div>
                <div style="background:#e67e22;width:${pPct}%;display:flex;align-items:center;justify-content:center;min-width:${d.pickup>0?'3px':'0'}">
                  ${pPct > 12 ? `<span style="font-size:10px;font-weight:700;color:#fff">${pPct}%</span>` : ''}
                </div>
                <div style="background:#7f8c8d;width:${ePct}%;display:flex;align-items:center;justify-content:center;min-width:${d.empty>0?'3px':'0'}">
                  ${ePct > 12 ? `<span style="font-size:10px;font-weight:700;color:#fff">${ePct}%</span>` : ''}
                </div>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:11px">
                <span style="color:#3498db;font-weight:600">🔵 Fuvar ${d.ride.toFixed(1)} km · ${rPct}%</span>
                <span style="color:#e67e22;font-weight:600">🟠 Kiállás ${d.pickup.toFixed(1)} km · ${pPct}%</span>
                ${d.empty > 0 ? `<span style="color:#7f8c8d;font-weight:600">⬜ Üres ${d.empty.toFixed(1)} km · ${ePct}%</span>` : ''}
              </div>
            </div>`;
          }).join('')
      }

      <!-- Havi arány sáv -->
      <div class="sep"></div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:6px">HAVI ARÁNY</div>
      <div style="background:var(--border);border-radius:100px;height:16px;overflow:hidden;display:flex">
        <div style="background:#3498db;width:${rideKmPct}%;display:flex;align-items:center;justify-content:center;min-width:${totalRideKm>0?'3px':'0'}">
          ${rideKmPct > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${rideKmPct}%</span>` : ''}
        </div>
        <div style="background:#e67e22;width:${pickupKmPct}%;display:flex;align-items:center;justify-content:center;min-width:${totalPickupKm>0?'3px':'0'}">
          ${pickupKmPct > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${pickupKmPct}%</span>` : ''}
        </div>
        <div style="background:#7f8c8d;width:${emptyKmPct}%;display:flex;align-items:center;justify-content:center;min-width:${totalEmptyKm>0?'3px':'0'}">
          ${emptyKmPct > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${emptyKmPct}%</span>` : ''}
        </div>
      </div>
      <div style="display:flex;justify-content:center;gap:10px;margin-top:6px;flex-wrap:wrap">
        <span style="font-size:11px;color:#3498db;font-weight:700">🔵 Fuvar ${rideKmPct}%</span>
        <span style="font-size:11px;color:#e67e22;font-weight:700">🟠 Kiállás ${pickupKmPct}%</span>
        ${emptyKmPct > 0 ? `<span style="font-size:11px;color:#7f8c8d;font-weight:700">⬜ Üres ${emptyKmPct}%</span>` : ''}
      </div>
    </div>`;
  }

  // ===== ZÓNA STATISZTIKA =====
  const fromZoneMap = {}, toZoneMap = {}, zoneRouteMap = {};
  ZONES.slice(1).forEach(z => { fromZoneMap[z] = {count:0,total:0}; toZoneMap[z] = {count:0,total:0}; });
  rides.forEach(r => {
    const fz = r.fromZone, tz = r.toZone;
    if (fz && fz !== '→ Nincs megadva →' && fromZoneMap[fz]) { fromZoneMap[fz].count++; fromZoneMap[fz].total += Number(r.amount)||0; }
    if (tz && tz !== '→ Nincs megadva →' && toZoneMap[tz])   { toZoneMap[tz].count++;   toZoneMap[tz].total   += Number(r.amount)||0; }
    if (fz && tz && fz !== '→ Nincs megadva →' && tz !== '→ Nincs megadva →') {
      const key = fz.split('(')[0].trim() + ' → ' + tz.split('(')[0].trim();
      if (!zoneRouteMap[key]) zoneRouteMap[key] = { count:0, total:0, color: ZONE_COLORS[ZONES.indexOf(fz)]||'#6b7280' };
      zoneRouteMap[key].count++; zoneRouteMap[key].total += Number(r.amount)||0;
    }
  });

  const hasFromZone = Object.values(fromZoneMap).some(z => z.count > 0);
  const hasToZone   = Object.values(toZoneMap).some(z => z.count > 0);
  const hasRoutes   = Object.keys(zoneRouteMap).length > 0;

  if (hasFromZone || hasToZone) {
    html += `<div class="card"><div class="card-title">📍 Zóna statisztika</div>`;

    if (hasFromZone) {
      const fromTotal = Object.values(fromZoneMap).reduce((s,z)=>s+z.count,0);
      html += `<div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:8px">INDULÁSI ZÓNÁK</div>`;
      ZONES.slice(1).forEach((z,i) => {
        const d = fromZoneMap[z]; if (!d.count) return;
        const pct = fromTotal > 0 ? Math.round(d.count/fromTotal*100) : 0;
        html += `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700;color:${ZONE_COLORS[i+1]}">📍 ${z.split('(')[0].trim()}</span>
            <span style="font-size:12px;font-weight:700">${d.count} fuvar · ${pct}%</span>
          </div>
          <div style="background:var(--border);border-radius:100px;height:10px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;border-radius:100px;background:${ZONE_COLORS[i+1]};width:${pct}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
            <span>${fmt(d.total)}</span><span>átlag ${fmt(Math.round(d.total/d.count))}/fuvar</span>
          </div>
        </div>`;
      });
    }

    if (hasToZone) {
      const toTotal = Object.values(toZoneMap).reduce((s,z)=>s+z.count,0);
      html += `<div class="sep"></div><div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:8px 0">ÉRKEZÉSI ZÓNÁK</div>`;
      ZONES.slice(1).forEach((z,i) => {
        const d = toZoneMap[z]; if (!d.count) return;
        const pct = toTotal > 0 ? Math.round(d.count/toTotal*100) : 0;
        html += `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700;color:${ZONE_COLORS[i+1]}">🏁 ${z.split('(')[0].trim()}</span>
            <span style="font-size:12px;font-weight:700">${d.count} fuvar · ${pct}%</span>
          </div>
          <div style="background:var(--border);border-radius:100px;height:10px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;border-radius:100px;background:${ZONE_COLORS[i+1]};width:${pct}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
            <span>${fmt(d.total)}</span><span>átlag ${fmt(Math.round(d.total/d.count))}/fuvar</span>
          </div>
        </div>`;
      });
    }

    if (hasRoutes) {
      const topRoutes = Object.entries(zoneRouteMap).sort((a,b)=>b[1].count-a[1].count).slice(0,5);
      html += `<div class="sep"></div><div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:8px 0">TOP ÚTVONALAK</div>`;
      topRoutes.forEach(([route, d]) => {
        const pct = rides.length > 0 ? Math.round(d.count/rides.length*100) : 0;
        html += `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:11px;font-weight:700">${route}</span>
            <span style="font-size:11px;font-weight:700">${d.count}× · ${pct}%</span>
          </div>
          <div style="background:var(--border);border-radius:100px;height:8px;overflow:hidden;margin-bottom:3px">
            <div style="height:100%;border-radius:100px;background:${d.color};width:${pct}%"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);text-align:right">átlag ${fmt(Math.round(d.total/d.count))}/fuvar · összesen ${fmt(d.total)}</div>
        </div>`;
      });
    }

    html += `</div>`;
  }

  // Category stats
  const catMap = {};
  CATEGORIES.slice(1).forEach(c => catMap[c] = { count:0, total:0 });
  rides.forEach(r => {
    const cats = Array.isArray(r.category) ? r.category : (r.category && r.category !== '→ Nincs megadva →' ? [r.category] : []);
    cats.forEach(c => {
      if (catMap[c]) { catMap[c].count++; catMap[c].total += Number(r.amount)||0; }
    });
  });
  const hasCatData = Object.values(catMap).some(c => c.count > 0);

  if (hasCatData) {
    html += `<div class="card"><div class="card-title">🏷 Kategóriák szerinti bontás</div>`;
    CATEGORIES.slice(1).forEach((c, i) => {
      const d = catMap[c];
      if (!d.count) return;
      const pct = rides.length > 0 ? Math.round(d.count / rides.length * 100) : 0;
      html += `
      <div class="pay-row">
        <div class="pay-header">
          <span class="pay-name">${c}</span>
          <span class="pay-pct">${pct}% · ${d.count} fuvar · ${fmt(d.total)}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%;background:${CAT_COLORS[i+1]}"></div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // ===== KERÜLETEN BELÜLI FUVAROK =====
  // Kerület kinyerése a cím szövegéből (irányítószám vagy "X. ker" alapján)
  function extractDistrict(text) {
    if (!text) return null;
    const t = String(text);
    // Irányítószám alapján: 1XXX
    const zipM = t.match(/\b(1\d{3})\b/);
    if (zipM) {
      const ker = Math.floor((parseInt(zipM[1]) - 1000) / 10);
      if (ker >= 1 && ker <= 23) return ker;
    }
    // "XI. ker" vagy "11. kerület" stb.
    const kerM = t.match(/\b([ivxlcdm]+|[1-9]|1[0-9]|2[0-3])[.\s]*(ker[.\s]|kerület)/i);
    if (kerM) {
      const raw = kerM[1].toLowerCase();
      const roman = {i:1,ii:2,iii:3,iv:4,v:5,vi:6,vii:7,viii:8,ix:9,x:10,xi:11,xii:12,xiii:13,xiv:14,xv:15,xvi:16,xvii:17,xviii:18,xix:19,xx:20,xxi:21,xxii:22,xxiii:23};
      return roman[raw] || parseInt(raw);
    }
    return null;
  }

  // Fuvarok ahol mindkét cím megvan
  const addressRides = rides.filter(r => r.from || r.to);
  const districtMap = {}; // kerület → { total, same, fromOnly }

  for (let k=1; k<=23; k++) districtMap[k] = { ker: k, total: 0, same: 0, avgSame: 0, avgCross: 0, sameTotAmt: 0, crossTotAmt: 0, crossCount: 0 };

  addressRides.forEach(r => {
    const fromK = extractDistrict(r.from) || extractDistrict(r.fromZone);
    const toK   = extractDistrict(r.to)   || extractDistrict(r.toZone);
    if (!fromK) return;
    districtMap[fromK].total++;
    if (toK && fromK === toK) {
      districtMap[fromK].same++;
      districtMap[fromK].sameTotAmt += Number(r.amount)||0;
    } else if (toK) {
      districtMap[fromK].crossTotAmt += Number(r.amount)||0;
      districtMap[fromK].crossCount++;
    }
  });

  const activeDistricts = Object.values(districtMap).filter(d => d.total > 0)
    .sort((a,b) => b.total - a.total);

  if (activeDistricts.length > 0) {
    const totalWithAddr = activeDistricts.reduce((s,d) => s+d.total, 0);
    const totalSame     = activeDistricts.reduce((s,d) => s+d.same,  0);
    const samePctTotal  = totalWithAddr > 0 ? Math.round(totalSame / totalWithAddr * 100) : 0;

    html += `<div class="card">
      <div class="card-title">🔄 Kerületen belüli fuvarok</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${totalWithAddr} címadattal rögzített fuvarból <strong style="color:var(--text)">${totalSame} (${samePctTotal}%)</strong> nem hagyta el a kerületet</div>

      <!-- Összesített arány -->
      <div style="background:var(--border);border-radius:100px;height:18px;overflow:hidden;display:flex;margin-bottom:12px">
        <div style="background:#e67e22;width:${samePctTotal}%;display:flex;align-items:center;justify-content:center;min-width:${totalSame?'4px':'0'}">
          ${samePctTotal > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${samePctTotal}%</span>` : ''}
        </div>
        <div style="background:#3498db;flex:1;display:flex;align-items:center;justify-content:center">
          ${(100-samePctTotal) > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${100-samePctTotal}%</span>` : ''}
        </div>
      </div>

      <div class="sep"></div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:8px">KERÜLETENKÉNTI BONTÁS</div>
      ${activeDistricts.map(d => {
        const samePct = d.total > 0 ? Math.round(d.same / d.total * 100) : 0;
        const avgS = d.same > 0 ? Math.round(d.sameTotAmt / d.same) : 0;
        const avgC = d.crossCount > 0 ? Math.round(d.crossTotAmt / d.crossCount) : 0;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700">${d.ker}. kerület</span>
            <span style="font-size:11px;font-weight:700">${d.total} fuvar</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:12px;overflow:hidden;display:flex;margin-bottom:3px">
            <div style="background:#e67e22;width:${samePct}%;min-width:${d.same?'3px':'0'};display:flex;align-items:center;justify-content:center">
              ${samePct > 20 ? `<span style="font-size:9px;font-weight:700;color:#fff">${samePct}%</span>` : ''}
            </div>
            <div style="background:#3498db;flex:1;display:flex;align-items:center;justify-content:center">
              ${(100-samePct) > 20 ? `<span style="font-size:9px;font-weight:700;color:#fff">${100-samePct}%</span>` : ''}
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
            <span>🟠 Belül: ${d.same} · ${avgS?avgS.toLocaleString()+' Ft':''}</span>
            <span>🔵 Kiment: ${d.crossCount} · ${avgC?avgC.toLocaleString()+' Ft':''}</span>
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
        <span style="font-size:11px;color:#e67e22;font-weight:700">🟠 Kerületen belül marad</span>
        <span style="font-size:11px;color:#3498db;font-weight:700">🔵 Kerületet elhagyta</span>
      </div>
    </div>`;
  }

  // ===== TOP ÚTVONALAK KERÜLETENKÉNT =====
  const distRouteMap = {};
  rides.forEach(r => {
    const fromK = extractDistrict(r.from) || extractDistrict(r.fromZone);
    const toK   = extractDistrict(r.to)   || extractDistrict(r.toZone);
    if (!fromK || !toK) return;
    const key = `${fromK}. ker → ${toK}. ker`;
    if (!distRouteMap[key]) distRouteMap[key] = { count:0, total:0, same: fromK===toK };
    distRouteMap[key].count++;
    distRouteMap[key].total += Number(r.amount)||0;
  });

  const topDistRoutes = Object.entries(distRouteMap).sort((a,b) => b[1].count - a[1].count).slice(0,10);

  if (topDistRoutes.length > 0) {
    const maxRouteCount = topDistRoutes[0][1].count;
    html += `<div class="card">
      <div class="card-title">🗺 Top útvonalak kerületenként</div>
      ${topDistRoutes.map(([route, d]) => {
        const pct = Math.round(d.count / rides.length * 100);
        const barPct = Math.round(d.count / maxRouteCount * 100);
        const avg = Math.round(d.total / d.count);
        const color = d.same ? '#e67e22' : '#3498db';
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
            <span style="font-size:12px;font-weight:700;color:${color}">${route}</span>
            <span style="font-size:11px;font-weight:700">${d.count}× · ${pct}%</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:10px;overflow:hidden;margin-bottom:2px">
            <div style="background:${color};width:${barPct}%;height:100%;border-radius:4px"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);text-align:right">átlag ${avg.toLocaleString()} Ft · össz. ${d.total.toLocaleString()} Ft</div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:12px;margin-top:6px">
        <span style="font-size:11px;color:#e67e22;font-weight:700">🟠 Kerületen belül</span>
        <span style="font-size:11px;color:#3498db;font-weight:700">🔵 Kerületek között</span>
      </div>
    </div>`;
  }

  // ===== ALACSONY ÖSSZEGŰ FUVAROK =====
  const THRESHOLD = 2500;
  const lowRides  = rides.filter(r => Number(r.amount) > 0 && Number(r.amount) < THRESHOLD);
  const highRides = rides.filter(r => Number(r.amount) >= THRESHOLD);
  const paidRides = rides.filter(r => Number(r.amount) > 0);

  if (paidRides.length > 0) {
    const lowPct  = Math.round(lowRides.length  / paidRides.length * 100);
    const highPct = 100 - lowPct;
    const lowTotal  = lowRides.reduce((s,r)  => s + Number(r.amount), 0);
    const highTotal = highRides.reduce((s,r) => s + Number(r.amount), 0);
    const avgLow  = lowRides.length  ? Math.round(lowTotal  / lowRides.length)  : 0;
    const avgHigh = highRides.length ? Math.round(highTotal / highRides.length) : 0;

    // Összeg szerinti bontás
    const brackets = [
      { label: '0–1000 Ft',    min:    1, max: 1000 },
      { label: '1001–1500 Ft', min: 1001, max: 1500 },
      { label: '1501–2000 Ft', min: 1501, max: 2000 },
      { label: '2001–2500 Ft', min: 2001, max: 2499 },
    ];

    html += `<div class="card">
      <div class="card-title">⚠️ Alacsony összegű fuvarok (< ${THRESHOLD.toLocaleString()} Ft)</div>

      <!-- Fő arány sáv -->
      <div style="background:var(--border);border-radius:100px;height:20px;overflow:hidden;display:flex;margin-bottom:6px">
        <div style="background:#e74c3c;width:${lowPct}%;display:flex;align-items:center;justify-content:center;min-width:${lowRides.length?'4px':'0'}">
          ${lowPct > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${lowPct}%</span>` : ''}
        </div>
        <div style="background:#2ecc71;flex:1;display:flex;align-items:center;justify-content:center">
          ${highPct > 15 ? `<span style="font-size:10px;font-weight:700;color:#fff">${highPct}%</span>` : ''}
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:12px">
        <span style="color:#e74c3c;font-weight:700">🔴 ${lowRides.length} fuvar · ${lowPct}%</span>
        <span style="color:#2ecc71;font-weight:700">🟢 ${highRides.length} fuvar · ${highPct}%</span>
      </div>

      <div class="stat-row"><span class="stat-name">Alacsony fuvarok átlaga</span><span class="stat-val" style="color:#e74c3c">${avgLow.toLocaleString()} Ft</span></div>
      <div class="stat-row"><span class="stat-name">Normál fuvarok átlaga</span><span class="stat-val" style="color:#2ecc71">${avgHigh.toLocaleString()} Ft</span></div>
      <div class="stat-row"><span class="stat-name">Elmaradt bevétel*</span><span class="stat-val" style="color:#e74c3c">${(lowRides.length * (avgHigh - avgLow)).toLocaleString()} Ft</span></div>
      <div style="font-size:9px;color:var(--muted);margin-bottom:10px">* ha minden fuvar elérte volna a normál átlagot</div>

      <div class="sep"></div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:8px">BONTÁS</div>
      ${brackets.map(b => {
        const cnt = rides.filter(r => Number(r.amount) >= b.min && Number(r.amount) <= b.max).length;
        if (!cnt) return '';
        const pct = Math.round(cnt / paidRides.length * 100);
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
            <span style="color:var(--muted)">${b.label}</span>
            <span style="font-weight:700">${cnt} fuvar · ${pct}%</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden">
            <div style="background:#e74c3c;width:${pct}%;height:100%;opacity:${0.5 + pct/200}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  return html;
}

function renderGoalsTab() {
  const { year, month } = state;
  const rides = getMonthRides(year, month);
  const total = rides.reduce((s,r) => s+(Number(r.amount)||0), 0);

  const todayRides = getDayRides(year, month, today.getDate());
  const todayTotal = todayRides.reduce((s,r) => s+(Number(r.amount)||0), 0);

  const dailyGoal = Number(state.goals.daily) || 0;
  const weeklyGoal = Number(state.goals.weekly) || 0;

  // This week rides
  const dayOfWeek = today.getDay();
  const weekStart = today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
  const weekDays = [];
  for (let i=0; i<7; i++) weekDays.push(weekStart+i);
  const weekRides = rides.filter(r => weekDays.includes(r.day));
  const weekTotal = weekRides.reduce((s,r) => s+(Number(r.amount)||0), 0);

  const dailyPct = dailyGoal > 0 ? Math.min(todayTotal / dailyGoal * 100, 100) : 0;
  const weeklyPct = weeklyGoal > 0 ? Math.min(weekTotal / weeklyGoal * 100, 100) : 0;

  // Hour earnings calc
  const shift = getShift(year, month, today.getDate());
  const shiftH = timeDiff(shift.start, shift.end);
  const hourly = shiftH > 0 ? todayTotal / shiftH : 0;
  const ridePerHour = shiftH > 0 ? todayRides.length / shiftH : 0;

  // All month shifts for km
  let totalRideKm = 0;
  rides.forEach(r => { if (r.km) totalRideKm += Number(r.km); });
  const kmFt = totalRideKm > 0 ? total / totalRideKm : 0;

  return `
  <div class="card">
    <div class="card-title">🎯 Célok beállítása</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Napi cél (Ft)</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="gDaily" value="${dailyGoal||''}" placeholder="pl. 25000" onchange="saveGoals()">
      </div>
      <div class="form-group">
        <label>Heti cél (Ft)</label>
        <input type="number" inputmode="numeric" pattern="[0-9]*" id="gWeekly" value="${weeklyGoal||''}" placeholder="pl. 150000" onchange="saveGoals()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 Mai nap → ${today.getDate()}. ${MONTHS[today.getMonth()]}</div>
    <div class="goal-section">
      <div class="goal-header">
        <span class="goal-label">Napi cél</span>
        <span class="goal-numbers">${fmt(todayTotal)} / ${dailyGoal ? fmt(dailyGoal) : 'nincs megadva'}</span>
      </div>
      ${dailyGoal > 0 ? `
      <div class="progress-wrap"><div class="progress-bar" style="width:${dailyPct}%;background:${dailyPct>=100?'#2ecc71':'#f5c542'}"></div></div>
      <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">${dailyPct.toFixed(0)}%
        ${dailyGoal > todayTotal ? ' · Még ' + fmt(dailyGoal - todayTotal) + ' hiányzik' : ' ✓'}
      </div>` : `<div style="font-size:12px;color:var(--muted)">Adj meg napi célt fent!</div>`}
    </div>

    <div class="sep"></div>

    <div class="stat-row"><span class="stat-name">Mai fuvarok</span><span class="stat-val">${todayRides.length}</span></div>
    <div class="stat-row"><span class="stat-name">Mai bevétel</span><span class="stat-val">${fmt(todayTotal)}</span></div>
    ${shiftH > 0 ? `<div class="stat-row"><span class="stat-name">Ledolgozott</span><span class="stat-val">${shiftH.toFixed(1)} h</span></div>` : ''}
    ${hourly > 0 ? `<div class="stat-row"><span class="stat-name">Ft/óra</span><span class="stat-val">${fmt(hourly)}</span></div>` : ''}
    ${ridePerHour > 0 ? `<div class="stat-row"><span class="stat-name">Fuvar/óra</span><span class="stat-val">${ridePerHour.toFixed(1)}</span></div>` : ''}
  </div>

  <div class="card">
    <div class="card-title">📅 Ezen a héten</div>
    <div class="goal-section">
      <div class="goal-header">
        <span class="goal-label">Heti cél</span>
        <span class="goal-numbers">${fmt(weekTotal)} / ${weeklyGoal ? fmt(weeklyGoal) : 'nincs megadva'}</span>
      </div>
      ${weeklyGoal > 0 ? `
      <div class="progress-wrap"><div class="progress-bar" style="width:${weeklyPct}%;background:${weeklyPct>=100?'#2ecc71':'#3498db'}"></div></div>
      <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">${weeklyPct.toFixed(0)}%
        ${weeklyGoal > weekTotal ? ' · Még ' + fmt(weeklyGoal - weekTotal) + ' hiányzik' : ' ✓'}
      </div>` : `<div style="font-size:12px;color:var(--muted)">Adj meg heti célt fent!</div>`}
    </div>
    <div class="stat-row"><span class="stat-name">Heti fuvarok</span><span class="stat-val">${weekRides.length}</span></div>
    <div class="stat-row"><span class="stat-name">Heti bevétel</span><span class="stat-val">${fmt(weekTotal)}</span></div>
  </div>

  ${totalRideKm > 0 ? `
  <div class="card">
    <div class="card-title">🚗 Kilométer kalkulátor → ${MONTHS[month]}</div>
    <div class="stat-row"><span class="stat-name">Összes km</span><span class="stat-val">${totalRideKm} km</span></div>
    <div class="stat-row"><span class="stat-name">Bevétel/km</span><span class="stat-val">${fmt(kmFt)}/km</span></div>
  </div>` : ''}
  `;
}
