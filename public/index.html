function exportJSON() {
  const data = JSON.stringify({ rides: state.rides, shifts: state.shifts, goals: state.goals, exportDate: new Date().toISOString() }, null, 2);
  downloadFile(data, 'fuvarnaplo_2026_backup.json', 'application/json');
  showToast('JSON mentés kész!');
}

function exportCSV() {
  const header = 'dátum,összeg,fizetés,km,kiállási_km,megjegyzés\n';
  const rows = state.rides.map(r => {
    const date = `${r.year}-${String(r.month+1).padStart(2,'0')}-${String(r.day).padStart(2,'0')}`;
    return [date, r.amount, r.payType, r.km||'', r.pickupKm||'', (r.note||'').replace(/,/g,' ')].join(',');
  });
  downloadFile(header + rows.join('\n'), 'fuvarnaplo_2026.csv', 'text/csv');
  showToast('CSV export kész!');
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

function togglePasteBox() {
  const box = document.getElementById('pasteBox');
  if (!box) return;
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  if (box.style.display === 'block') {
    setTimeout(() => document.getElementById('jsonPasteArea')?.focus(), 100);
  }
}

function importFromPaste() {
  const text = document.getElementById('jsonPasteArea')?.value?.trim();
  if (!text) { showToast('Üres mező!', '#e74c3c'); return; }
  try {
    const data = JSON.parse(text);

    // Különböző backup struktúrák kezelése
    const rides = data.rides || data.fuvarok || [];
    const shifts = data.shifts || data.muszakok || {};
    const goals  = data.goals  || data.celok   || {};

    if (!rides.length && !Object.keys(shifts).length) {
      showToast('Nem fuvarnapló fájl vagy üres backup!', '#e74c3c');
      return;
    }

    const count = rides.length;
    if (!confirm(`${count} fuvar és ${Object.keys(shifts).length} műszak kerül visszaállításra.\nA jelenlegi adatok felülíródnak!\n\nFolytatod?`)) return;

    state.rides  = rides;
    state.shifts = shifts;
    if (Object.keys(goals).length) state.goals = goals;

    saveState();
    document.getElementById('jsonPasteArea').value = '';
    document.getElementById('pasteBox').style.display = 'none';
    showToast(`✓ Visszaállítva! (${count} fuvar)`);
    render();
  } catch(e) {
    showToast('Hibás JSON! Ellenőrizd a tartalmat.', '#e74c3c');
    console.error(e);
  }
}

function triggerImportJSON() {
  const inp = document.getElementById('importJsonInput');
  if (!inp) return;
  inp.value = '';
  inp.click();
}

function importJSON(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.rides && !data.shifts) { showToast('Nem fuvarnapló fájl!', '#e74c3c'); return; }
      const count = data.rides ? data.rides.length : 0;
      if (!confirm(`${count} fuvar kerül visszaállításra.\nFolytatod?`)) return;
      if (data.rides) state.rides = data.rides;
      if (data.shifts) state.shifts = data.shifts;
      if (data.goals) state.goals = data.goals;
      saveState();
      showToast(`✓ Visszaállítva! (${count} fuvar)`);
      render();
    } catch(e) { showToast('Hibás fájl!', '#e74c3c'); }
  };
  reader.onerror = () => showToast('Fájl olvasási hiba!', '#e74c3c');
  reader.readAsText(file, 'utf-8');
}

function importCSV(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    let imported = 0;
    // skip header
    const start = lines[0].toLowerCase().includes('dát') ? 1 : 0;
    for (let i=start; i<lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 2) continue;
      const dateParts = (cols[0]||'').trim().split('-');
      if (dateParts.length < 3) continue;
      const year = Number(dateParts[0]);
      const month = Number(dateParts[1]) - 1;
      const day = Number(dateParts[2]);
      const amount = Number(cols[1]) || 0;
      if (!amount) continue;
      state.rides.push({
        id: uid(),
        year, month, day, amount,
        payType: cols[2]?.trim() || 'Egyéb',
        km: cols[3]?.trim() || '',
        pickupKm: cols[4]?.trim() || '',
        note: cols[5]?.trim() || '',
        time: '',
      });
      imported++;
    }
    saveState();
    showToast(`${imported} fuvar importálva!`);
    render();
  };
  reader.readAsText(file);
}

async function clearAllData() {
  if (!confirm('BIZTOSAN törlöd az összes adatot? Ez nem visszavonható!')) return;
  state.rides = [];
  state.shifts = {};
  try { await fetch('/api/all', { method: 'DELETE' }); } catch(e) { console.error(e); }
  showToast('Törölve.', '#e74c3c');
  render();
}

// ===== YEAR HELPERS =====
function getYearRides(year) {
  return state.rides.filter(r => r.year === year);
}

function getYearShiftData(year) {
  return Object.keys(state.shifts)
    .filter(k => k.startsWith(`${year}_`))
    .map(k => state.shifts[k]);
}

function getAvailableYears() {
  const ys = new Set(state.rides.map(r => r.year));
  ys.add(state.year);
  return Array.from(ys).sort((a,b)=>a-b);
}

function setYear(y) {
  state.year = Number(y);
  render();
}

// ===== YEAR TAB =====

  const year = state.year;
  const years = getAvailableYears();

  const rides = getYearRides(year);
  const total = rides.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const workDays = new Set(rides.map(r => `${r.month}_${r.day}`)).size;
  const avgDay = workDays ? total / workDays : 0;
  const avgRide = rides.length ? total / rides.length : 0;

  // Monthly totals & counts
  const monthTotals = Array.from({length:12}, (_,m) =>
    rides.filter(r=>r.month===m).reduce((s,r)=>s+(Number(r.amount)||0),0)
  );
  const monthCounts = Array.from({length:12}, (_,m) =>
    rides.filter(r=>r.month===m).length
  );

  const maxMonth = Math.max(...monthTotals, 1);
  const bestMonthIdx = monthTotals.indexOf(Math.max(...monthTotals));
  const bestMonthName = MONTHS[bestMonthIdx];

  // Payment breakdown (éves)
  const payMap = {};
  PAY_TYPES.forEach(p => payMap[p] = { count:0, total:0 });
  rides.forEach(r => {
    const p = r.payType || 'Egyéb';
    if (payMap[p]) { payMap[p].count++; payMap[p].total += Number(r.amount)||0; }
  });

  // Shift stats (éves)
  const shiftData = getYearShiftData(year);
  const totalHours = shiftData.reduce((s,sh)=>s + timeDiff(sh.start, sh.end), 0);
  const hourly = totalHours > 0 ? total / totalHours : 0;

    <div class="stat-row"><span class="stat-name">Napi átlag</span><span class="stat-val">${fmt(avgDay)}</span></div>
    <div class="stat-row"><span class="stat-name">Fuvaronkénti átlag</span><span class="stat-val">${fmt(avgRide)}</span></div>
    ${totalHours > 0 ? `<div class="stat-row"><span class="stat-name">Ledolgozott órák</span><span class="stat-val">${totalHours.toFixed(1)} h</span></div>` : ''}
    ${hourly > 0 ? `<div class="stat-row"><span class="stat-name">Átlag Ft/óra</span><span class="stat-val">${fmt(hourly)}/h</span></div>` : ''}
    <div class="stat-row"><span class="stat-name">Legjobb hónap</span><span class="stat-val">${bestMonthName}</span></div>
  </div>

  <div class="card">
    <div class="card-title">📊 Havi bevétel → ${year}</div>
    <div class="chart-wrap">`;

  for (let m=0; m<12; m++) {

      <div class="chart-bar-wrap" style="position:relative">
        <div class="chart-bar" style="height:${h}%"></div>
      </div>`;
  }

  html += `</div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:10px;color:var(--muted)">Jan</span>
      <span style="font-size:10px;color:var(--muted)">Dec</span>
    </div>

    <div class="sep"></div>
    ${monthTotals.map((v,m)=>`
      <div class="stat-row">
        <span class="stat-name">${MONTHS[m]}</span>
        <span class="stat-val">${fmt(v)} · ${monthCounts[m]} fuvar</span>
      </div>
    `).join('')}
  </div>

  <div class="card">
    <div class="card-title">💸 Fizetési módok → ${year}</div>`;

  PAY_TYPES.forEach((p,i) => {
    const d = payMap[p];
    if (!d.count) return;
    const pct = total > 0 ? Math.round(d.total/total*100) : 0;
    html += `
    <div class="pay-row">
      <div class="pay-header">
        <span class="pay-name">${p}</span>
        <span class="pay-pct">${pct}% · ${fmt(d.total)} · ${d.count} fuvar</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" style="width:${pct}%;background:${PAY_COLORS[i]}"></div>
      </div>
    </div>`;
  });

  html += `</div>`;

  if (!rides.length) {
    html += `<div class="card"><div style="font-size:13px;color:var(--muted);text-align:center">
      Nincs adat ebben az évben.
    </div></div>`;
  }

  return html;
}

</script>
</body>
</html>
